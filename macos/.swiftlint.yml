disabled_rules:
  - trailing_whitespace  # handled by .editorconfig

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - explicit_init
  - first_where
  - implicit_return
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 60
  error: 100

excluded:
  - .build/
  - Tests/
